# PulseGuard – Local / staging Docker Compose
# Usage: docker-compose up -d

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_DATABASE=pulseguard
      - DB_USERNAME=pulseguard
      - DB_PASSWORD=secret
      - QUEUE_CONNECTION=database
      - CACHE_STORE=database
    depends_on:
      - mysql
    volumes:
      - .:/app
      - ./storage:/app/storage

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    command: php artisan queue:work database --sleep=3 --tries=3
    environment:
      - APP_ENV=local
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_DATABASE=pulseguard
      - DB_USERNAME=pulseguard
      - DB_PASSWORD=secret
      - QUEUE_CONNECTION=database
    depends_on:
      - mysql
      - app
    volumes:
      - .:/app

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: pulseguard
      MYSQL_USER: pulseguard
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    environment:
      - APP_ENV=local
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_DATABASE=pulseguard
      - DB_USERNAME=pulseguard
      - DB_PASSWORD=secret
    depends_on:
      - mysql
      - app
    volumes:
      - .:/app

volumes:
  mysql_data:
